<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoldStar | Qualifica</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      padding: 0 0 40px 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #222;
    }
    .logo {
      width: 44px; height: 44px;
      background: #f5a623;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .header-text h2 { font-size: 16px; font-weight: 700; }
    .header-text span { font-size: 11px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
    .badge {
      margin-left: auto;
      background: #7c3aed;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
    }
    .progress-bar {
      display: flex;
      gap: 5px;
      padding: 14px 20px 0;
    }
    .progress-bar div {
      flex: 1; height: 4px;
      background: #333;
      border-radius: 4px;
      transition: background 0.3s;
    }
    .progress-bar div.active { background: #7c3aed; }
    .step-label {
      padding: 10px 20px 0;
      font-size: 11px;
      color: #7c3aed;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .back-btn {
      margin: 14px 20px 0;
      background: #1e1e1e;
      border: none;
      color: #aaa;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      display: none;
    }
    .back-btn.visible { display: inline-block; }
    .content { padding: 20px 20px 0; }
    .content h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .content p { font-size: 14px; color: #888; margin-bottom: 22px; }
    .option {
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .option:hover { border-color: #7c3aed; }
    .option.selected { border-color: #7c3aed; background: #1c1535; }
    .option-main { font-size: 15px; font-weight: 600; }
    .option-sub { font-size: 12px; color: #666; margin-top: 2px; }
    .option-dot {
      width: 20px; height: 20px; min-width: 20px;
      border-radius: 50%;
      border: 2px solid #444;
      margin-left: auto;
      transition: all 0.2s;
    }
    .option.selected .option-dot {
      background: #7c3aed;
      border-color: #7c3aed;
    }
    .next-btn {
      width: 100%;
      background: #00c9b1;
      color: #000;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 20px;
      transition: opacity 0.2s;
    }
    .next-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    textarea {
      width: 100%;
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      padding: 14px;
      resize: none;
      height: 130px;
      outline: none;
      font-family: inherit;
    }
    textarea:focus { border-color: #7c3aed; }
    .optional-hint { font-size: 12px; color: #555; margin-top: 6px; }
    .success {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }
    .success .icon { font-size: 60px; margin-bottom: 20px; }
    .success h1 { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
    .success p { color: #888; font-size: 15px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">⭐</div>
  <div class="header-text">
    <h2>Assistente</h2>
    <span>Qualifica</span>
  </div>
  <div class="badge">Qualifica</div>
</div>

<div id="quiz">
  <div class="progress-bar" id="progressBar">
    <div></div><div></div><div></div><div></div><div></div>
  </div>
  <div class="step-label" id="stepLabel">QUALIFICA • Step 1 di 5</div>
  <button class="back-btn" id="backBtn" onclick="goBack()">← Indietro</button>
  <div class="content" id="stepContent"></div>
</div>

<div class="success" id="successScreen">
  <div class="icon">✅</div>
  <h1>Richiesta inviata!</h1>
  <p>Il nostro team ti contatterà presto su Telegram.</p>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const steps = [
    {
      title: "Sei maggiorenne?",
      desc: "I nostri servizi sono riservati ai maggiorenni.",
      key: "maggiorenne",
      options: [
        { label: "Sì, ho compiuto 18 anni", sub: "" },
        { label: "No, sono minorenne", sub: "" }
      ]
    },
    {
      title: "Che esperienza hai nel trading?",
      desc: "Ti guidiamo al servizio più adatto.",
      key: "esperienza",
      options: [
        { label: "Nessuna esperienza", sub: "Completamente nuovo" },
        { label: "Base", sub: "Conosco i fondamentali" },
        { label: "Intermedia o Avanzata", sub: "Ho già operato sui mercati" }
      ]
    },
    {
      title: "Qual è il tuo budget?",
      desc: "Indicativo, per consigliarti meglio.",
      key: "budget",
      options: [
        { label: "150 – 500 EUR", sub: "Entry level" },
        { label: "500 – 1.500 EUR", sub: "Intermedio" },
        { label: "1.500 – 5.000 EUR", sub: "Avanzato" },
        { label: "5.000+ EUR", sub: "Premium" }
      ]
    },
    {
      title: "Quale servizio ti interessa?",
      desc: "Puoi approfondire con il team.",
      key: "servizio",
      options: [
        { label: "Copy Trading", sub: "Copia automaticamente i trader professionisti" },
        { label: "Segnali VIP", sub: "Ricevi segnali in tempo reale" },
        { label: "Trading Autonomo", sub: "Opero in autonomia" },
        { label: "Info Generali", sub: "Voglio sapere di più" }
      ]
    }
  ];

  let current = 0;
  let answers = {};
  let selected = null;

  function renderStep() {
    const bar = document.getElementById("progressBar");
    const bars = bar.querySelectorAll("div");
    bars.forEach((b, i) => b.classList.toggle("active", i <= current));

    const isLast = current === steps.length;
    document.getElementById("stepLabel").textContent =
      `QUALIFICA • Step ${current + 1} di 5`;
    document.getElementById("backBtn").classList.toggle("visible", current > 0);

    const content = document.getElementById("stepContent");

    if (!isLast) {
      const step = steps[current];
      selected = null;
      content.innerHTML = `
        <h1>${step.title}</h1>
        <p>${step.desc}</p>
        <div id="options">
          ${step.options.map((o, i) => `
            <div class="option" onclick="selectOption(${i}, '${o.label}')" id="opt${i}">
              <div>
                <div class="option-main">${o.label}</div>
                ${o.sub ? `<div class="option-sub">${o.sub}</div>` : ""}
              </div>
              <div class="option-dot"></div>
            </div>
          `).join("")}
        </div>
        <button class="next-btn" id="nextBtn" onclick="nextStep()" disabled>Continua</button>
      `;
    } else {
      // Step 5: textarea
      document.getElementById("stepLabel").textContent = "QUALIFICA • Step 5 di 5";
      content.innerHTML = `
        <h1>Hai domande specifiche?</h1>
        <p>Facoltativo — il team le leggerà prima di contattarti.</p>
        <textarea id="noteInput" placeholder="Scrivi qui..."></textarea>
        <p class="optional-hint">Puoi lasciare vuoto</p>
        <button class="next-btn" id="nextBtn" onclick="submitForm()">Invia</button>
      `;
    }
  }

  function selectOption(i, label) {
    document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
    document.getElementById("opt" + i).classList.add("selected");
    selected = label;
    document.getElementById("nextBtn").disabled = false;
  }

  function nextStep() {
    if (!selected) return;
    answers[steps[current].key] = selected;
    current++;
    renderStep();
  }

  function goBack() {
    if (current > 0) {
      current--;
      renderStep();
    }
  }

  async function submitForm() {
    const note = document.getElementById("noteInput").value.trim();
    answers["domande"] = note || "—";

    // Dati utente da Telegram
    const user = tg.initDataUnsafe?.user || {};
    answers["username"] = user.username || "";
    answers["user_id"] = user.id || "";

    try {
      const res = await fetch("https://goldstar-bot-production.up.railway.app/lead", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(answers)
      });

      if (res.ok) {
        document.getElementById("quiz").style.display = "none";
        document.getElementById("successScreen").style.display = "block";
        setTimeout(() => tg.close(), 3000);
      } else {
        alert("Errore nell'invio. Riprova.");
      }
    } catch (e) {
      alert("Errore di connessione. Riprova.");
    }
  }

  renderStep();
</script>
</body>
</html>
